spring.application.name=codereview-ai

# Gemini API — key comes from environment variable, never hardcode in code
spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.chat.options.model=gemini-2.5-flash

# Embedding model for RAG vector store
spring.ai.model.embedding.text=google-genai
spring.ai.google.genai.embedding.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.embedding.text.options.model=gemini-embedding-001
spring.ai.google.genai.embedding.text.options.output-dimensionality=1536

# PostgreSQL + pgvector — persistent vector store
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/codereview_ai}
spring.datasource.username=${DATABASE_USER:naveen}
spring.datasource.password=${DATABASE_PASSWORD:codereview}

# Spring AI PgVector settings
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.dimensions=1536

logging.level.root=INFO
logging.level.com.naveen.codereviewai=INFO

