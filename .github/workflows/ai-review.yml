name: AI Code Review

on:
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize ]

jobs:
  review:
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR Diff
        id: diff
        run: |
          DIFF=$(gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }})
          echo "$DIFF" > /tmp/pr_diff.txt
          echo "Diff length: $(wc -c < /tmp/pr_diff.txt) bytes"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: AI Review
        id: review
        run: |
          DIFF=$(cat /tmp/pr_diff.txt)

          if [ ${#DIFF} -gt 30000 ]; then
            DIFF="${DIFF:0:30000}... (truncated)"
          fi

          RESPONSE=$(curl -s "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${{ secrets.GEMINI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg diff "$DIFF" --arg title "${{ github.event.pull_request.title }}" '{
              "contents": [{
                "parts": [{
                  "text": ("You are a senior Java developer reviewing a Pull Request.\n\nPR Title: " + $title + "\n\nDiff:\n" + $diff + "\n\nProvide a concise code review with these sections:\n## Bugs\nList any bugs or potential runtime issues.\n\n## Improvements\nCode quality, readability, performance suggestions.\n\n## Security\nSecurity vulnerabilities or concerns.\n\n## Summary\nOne sentence overall assessment.\n\nBe specific. Reference file names and line numbers from the diff.")
                }]
              }]
            }')")

          REVIEW=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // "Failed to generate review"')
          echo "$REVIEW" > /tmp/review.txt
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Post Review Comment
        run: |
          REVIEW=$(cat /tmp/review.txt)
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body "## AI Code Review

          $REVIEW

          ---
          *Automated review by CodeReview AI*"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
