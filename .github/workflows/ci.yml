# ============================================================
# CI WORKFLOW — Build & Test
# ============================================================
# This runs every time someone opens a PR against main.
# If tests fail, the PR gets a red X — can't merge broken code.

# "name" — shows up in the GitHub Actions tab
name: CI — Build & Test

# "on" — WHEN does this workflow run?
on:
  pull_request:              # trigger: someone opens or updates a PR
    branches: [ main ]       # only PRs targeting the main branch

# "jobs" — WHAT does this workflow do?
# A workflow can have multiple jobs. Each job runs on a fresh VM.
jobs:
  build:
    # runs-on — which machine to use
    # ubuntu-latest = a fresh Linux VM that GitHub spins up for free
    # It has nothing installed except basic tools
    runs-on: ubuntu-latest

    # steps — the ordered list of commands to run
    steps:
      # actions/checkout@v4 — clones YOUR repo onto the VM
      # Without this, the VM is empty — it doesn't have your code
      - uses: actions/checkout@v4

      # actions/setup-java@v4 — installs Java on the VM
      # The VM doesn't come with Java, so we install it
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'           # install Java 17
          distribution: 'temurin'      # which JDK vendor (Eclipse Temurin = free, popular)
          cache: maven                 # cache ~/.m2 folder between runs (faster builds)

      # Run Maven build + all tests
      # "clean verify" = delete old build → compile → run tests → check everything
      # --no-transfer-progress = hide the noisy download progress bars in logs
      - name: Build and Test
        run: ./mvnw clean verify --no-transfer-progress
